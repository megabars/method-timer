<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Фон — скруглённый квадрат (тёмная тема) -->
  <rect width="40" height="40" rx="8" ry="8" fill="#2B2D30"/>

  <!-- Секундомер — корпус -->
  <circle cx="20" cy="22" r="12" fill="none" stroke="#CED0D6" stroke-width="2.2"/>

  <!-- Кнопка сверху -->
  <rect x="18.5" y="7" width="3" height="4" rx="1" fill="#CED0D6"/>

  <!-- Боковая кнопка -->
  <line x1="28" y1="13" x2="31" y2="10" stroke="#CED0D6" stroke-width="2" stroke-linecap="round"/>

  <!-- Стрелка секундомера -->
  <line x1="20" y1="22" x2="25" y2="14" stroke="#548AF7" stroke-width="2" stroke-linecap="round"/>

  <!-- Центральная точка -->
  <circle cx="20" cy="22" r="1.5" fill="#548AF7"/>

  <!-- Деления на циферблате -->
  <line x1="20" y1="12.5" x2="20" y2="14.5" stroke="#CED0D6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="29.5" x2="20" y2="31.5" stroke="#CED0D6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10.5" y1="22" x2="12.5" y2="22" stroke="#CED0D6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27.5" y1="22" x2="29.5" y2="22" stroke="#CED0D6" stroke-width="1.2" stroke-linecap="round"/>
</svg>
